<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#03100d">
  <link rel="icon" href="data:,">
  <title>TURNO - Carpeta de producción</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7f6ef;
      --muted: #99aaa3;
      --yellow: #e7b600;
      --line: rgba(255,255,255,.15);
      --glass: rgba(3,16,13,.88);
      --page-ratio: 595.5 / 842.25;
      --bar-height: 205px;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }

    body {
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 78% 12%, rgba(20,80,61,.4), transparent 33rem),
        radial-gradient(circle at 12% 85%, rgba(0,84,92,.18), transparent 40rem),
        linear-gradient(145deg, #010705, #061713 52%, #010604);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, a { -webkit-tap-highlight-color: transparent; }
    button { color: inherit; font: inherit; }

    .app { position: relative; width: 100%; height: 100dvh; min-height: 30rem; }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      height: 4.5rem;
      padding: max(.8rem, env(safe-area-inset-top)) clamp(1rem,3vw,2.5rem) .6rem;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(1,8,6,.86), transparent);
    }

    .brand, .toolbar { pointer-events: auto; }

    .brand {
      display: flex;
      align-items: center;
      gap: .8rem;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .brand-mark { width: .4rem; height: 2.15rem; background: var(--yellow); }
    .brand strong { display: block; font-size: .87rem; }
    .brand span { display: block; color: var(--muted); font-size: .62rem; }

    .toolbar { display: flex; align-items: center; gap: .45rem; }

    .control, .round, .panel-close {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.055);
      backdrop-filter: blur(14px);
      cursor: pointer;
      transition: border-color .2s ease, background .2s ease, transform .2s ease;
    }

    .control {
      min-height: 2.55rem;
      padding: .62rem .9rem;
      border-radius: 999px;
      font-size: .72rem;
      font-weight: 800;
      letter-spacing: .07em;
      text-transform: uppercase;
    }

    .control:hover, .round:hover, .panel-close:hover {
      border-color: rgba(231,182,0,.82);
      background: rgba(231,182,0,.11);
    }

    .control:active, .round:active, .panel-close:active { transform: scale(.96); }

    .reader {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 4.7rem 5.2rem 3.1rem;
      perspective: 2200px;
      transition: padding-bottom .35s ease;
    }

    body.pages-open .reader { padding-bottom: calc(var(--bar-height) + 1rem); }

    .book {
      position: relative;
      width: min(calc((100dvh - 8.4rem) * .707), calc(100vw - 11rem));
      max-height: calc(100dvh - 8.4rem);
      aspect-ratio: var(--page-ratio);
      transform-style: preserve-3d;
      filter: drop-shadow(0 1.8rem 2.7rem rgba(0,0,0,.6));
      transition: width .62s cubic-bezier(.2,.85,.22,1), aspect-ratio .62s ease;
    }

    .book.mode-spread {
      width: min(calc((100dvh - 8.4rem) * 1.414), calc(100vw - 11rem));
      aspect-ratio: 1191 / 842.25;
    }

    body.pages-open .book {
      width: min(calc((100dvh - 8.4rem - var(--bar-height)) * .707), calc(100vw - 11rem));
      max-height: calc(100dvh - 8.4rem - var(--bar-height));
    }

    body.pages-open .book.mode-spread {
      width: min(calc((100dvh - 8.4rem - var(--bar-height)) * 1.414), calc(100vw - 11rem));
    }

    .spread-layer {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: stretch;
      transform-style: preserve-3d;
      will-change: opacity, transform, filter;
    }

    .spread-layer.hidden { visibility: hidden; opacity: 0; pointer-events: none; }
    .spread-layer.active { z-index: 3; }
    .spread-layer.incoming { z-index: 2; }

    .spread-layer.mode-single .page-slot:first-child { width: 100%; }
    .spread-layer.mode-single .page-slot:last-child { display: none; }
    .spread-layer.mode-spread .page-slot { width: 50%; }

    .page-slot {
      position: relative;
      height: 100%;
      overflow: hidden;
      background: #0c0d0c;
      touch-action: pan-x pan-y pinch-zoom;
      box-shadow: 0 0 0 1px rgba(255,255,255,.13), 0 .8rem 2rem rgba(0,0,0,.35);
    }

    .mode-single .page-slot { border-radius: .18rem .58rem .58rem .18rem; }
    .mode-single .page-slot::before {
      content: "";
      position: absolute;
      left: -.35rem;
      inset-block: 0;
      z-index: 8;
      width: .42rem;
      background: var(--yellow);
    }

    .mode-spread .page-slot:first-child { border-radius: .55rem 0 0 .55rem; }
    .mode-spread .page-slot:last-child { border-radius: 0 .55rem .55rem 0; }
    .mode-spread .page-slot:first-child::after,
    .mode-spread .page-slot:last-child::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      z-index: 7;
      width: 8%;
      pointer-events: none;
    }
    .mode-spread .page-slot:first-child::after { right: 0; background: linear-gradient(90deg, transparent, rgba(0,0,0,.3)); }
    .mode-spread .page-slot:last-child::after { left: 0; background: linear-gradient(90deg, rgba(0,0,0,.24), transparent); }

    .page-slot.blank {
      background: linear-gradient(135deg, #121512, #080a09);
    }
    .page-slot.blank::before {
      content: "TURNO";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(255,255,255,.06);
      font-weight: 900;
      letter-spacing: .18em;
    }

    .page-canvas, .page-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #0a0a0a;
    }
    .page-canvas[hidden], .page-image[hidden] { display: none; }

    .link-layer { position: absolute; inset: 0; z-index: 9; pointer-events: none; }
    .pdf-link {
      position: absolute;
      display: block;
      min-height: 10px;
      border-radius: .12rem;
      outline: 1px solid transparent;
      pointer-events: auto;
      transition: outline-color .2s ease, background .2s ease;
    }
    .pdf-link:hover, .pdf-link:focus-visible {
      outline-color: var(--yellow);
      background: rgba(231,182,0,.22);
    }

    .spread-layer.exit-forward { z-index: 8; animation: spread-exit-forward .72s ease forwards; }
    .spread-layer.exit-back { z-index: 8; animation: spread-exit-back .72s ease forwards; }
    .spread-layer.enter-forward { animation: spread-enter-forward .72s ease both; }
    .spread-layer.enter-back { animation: spread-enter-back .72s ease both; }

    @keyframes spread-exit-forward { to { opacity: .15; transform: translateX(-2.5%) scale(.99); filter: brightness(.55); } }
    @keyframes spread-exit-back { to { opacity: .15; transform: translateX(2.5%) scale(.99); filter: brightness(.55); } }
    @keyframes spread-enter-forward { from { opacity: .35; transform: translateX(2%) scale(.99); } }
    @keyframes spread-enter-back { from { opacity: .35; transform: translateX(-2%) scale(.99); } }

    .flip-leaf {
      position: absolute;
      top: 0;
      z-index: 20;
      display: none;
      height: 100%;
      overflow: hidden;
      backface-visibility: hidden;
      transform-style: preserve-3d;
      box-shadow: 0 0 2rem rgba(0,0,0,.4);
      pointer-events: none;
    }
    .flip-leaf canvas { width: 100%; height: 100%; object-fit: fill; }
    .flip-leaf.forward { display: block; transform-origin: left center; animation: leaf-forward .72s cubic-bezier(.62,.05,.22,1) forwards; }
    .flip-leaf.back { display: block; transform-origin: right center; animation: leaf-back .72s cubic-bezier(.62,.05,.22,1) forwards; }
    @keyframes leaf-forward { 0% { transform: rotateY(0); filter: brightness(1); } 55% { filter: brightness(.58); } 100% { transform: rotateY(-178deg); filter: brightness(.35); opacity: .12; } }
    @keyframes leaf-back { 0% { transform: rotateY(0); filter: brightness(1); } 55% { filter: brightness(.58); } 100% { transform: rotateY(178deg); filter: brightness(.35); opacity: .12; } }

    .round {
      position: fixed;
      top: 50%;
      z-index: 30;
      display: grid;
      place-items: center;
      width: 3.15rem;
      height: 3.15rem;
      margin-top: -1.575rem;
      border-radius: 50%;
      font-size: 1.25rem;
    }
    .round.prev { left: 1.25rem; }
    .round.next { right: 1.25rem; }
    .round:disabled { opacity: .22; cursor: default; }

    .status {
      position: fixed;
      left: 50%;
      bottom: 1rem;
      z-index: 25;
      transform: translateX(-50%);
      color: var(--muted);
      font-size: .74rem;
      letter-spacing: .07em;
      white-space: nowrap;
      transition: bottom .35s ease;
    }
    .status strong { color: var(--ink); }
    body.pages-open .status { bottom: calc(var(--bar-height) + .6rem); }

    .loading {
      position: absolute;
      inset: 0;
      z-index: 35;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: #07130f;
      font-size: .72rem;
      font-weight: 800;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .loading[hidden] { display: none; }
    .error-card { max-width: 25rem; padding: 1.4rem; color: var(--ink); line-height: 1.5; text-align: center; text-transform: none; letter-spacing: 0; }
    .error-card a { color: var(--yellow); }

    .backdrop {
      position: fixed;
      inset: 0;
      z-index: 59;
      opacity: 0;
      visibility: hidden;
      background: rgba(0,0,0,.58);
      transition: opacity .25s ease, visibility .25s ease;
    }
    body.index-open .backdrop { opacity: 1; visibility: visible; }

    .index-panel {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 60;
      width: min(25rem,90vw);
      padding: max(1.4rem,env(safe-area-inset-top)) 1.25rem 1.4rem;
      overflow: auto;
      transform: translateX(-103%);
      border-right: 1px solid var(--line);
      background: var(--glass);
      backdrop-filter: blur(24px);
      transition: transform .32s cubic-bezier(.2,.8,.2,1);
    }
    body.index-open .index-panel { transform: translateX(0); }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .panel-head h2 { margin: 0; font-size: 1.15rem; letter-spacing: .08em; text-transform: uppercase; }
    .panel-head small { color: var(--muted); }
    .panel-close { width: 2.35rem; height: 2.35rem; flex: 0 0 auto; border-radius: 50%; }

    .toc { display: grid; gap: .3rem; padding-top: 1rem; border-top: 1px solid var(--line); }
    .toc button {
      display: grid;
      grid-template-columns: 2.4rem 1fr;
      gap: .75rem;
      width: 100%;
      padding: .78rem;
      border: 0;
      border-radius: .4rem;
      color: var(--ink);
      background: transparent;
      text-align: left;
      cursor: pointer;
    }
    .toc button:hover, .toc button[aria-current="page"] { background: rgba(231,182,0,.12); }
    .toc-number { color: var(--yellow); font-weight: 850; }

    .pages-panel {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 55;
      display: grid;
      grid-template-rows: auto 1fr;
      height: var(--bar-height);
      padding: .65rem 1.2rem .8rem;
      transform: translateY(103%);
      border-top: 1px solid var(--line);
      background: var(--glass);
      backdrop-filter: blur(24px);
      transition: transform .35s cubic-bezier(.2,.8,.2,1);
    }
    body.pages-open .pages-panel { transform: translateY(0); }
    .pages-panel .panel-head { margin: 0 0 .45rem; }

    .thumbs {
      display: flex;
      align-items: flex-start;
      gap: .8rem;
      min-width: 0;
      overflow-x: auto;
      overflow-y: hidden;
      padding: .18rem .2rem .6rem;
      scroll-behavior: smooth;
      scrollbar-color: rgba(231,182,0,.65) rgba(255,255,255,.06);
      scrollbar-width: thin;
    }

    .thumb {
      flex: 0 0 5.15rem;
      padding: .22rem;
      border: 2px solid transparent;
      border-radius: .38rem;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      text-align: center;
      transition: border-color .18s ease, background .18s ease, color .18s ease, transform .18s ease;
    }
    .thumb:hover { border-color: rgba(231,182,0,.55); color: var(--ink); transform: translateY(-2px); }
    .thumb.is-visible { border-color: rgba(231,182,0,.42); background: rgba(231,182,0,.06); }
    .thumb.is-selected { border-color: var(--yellow); color: var(--ink); background: rgba(231,182,0,.13); }
    .thumb-media {
      display: grid;
      place-items: center;
      width: 100%;
      aspect-ratio: var(--page-ratio);
      overflow: hidden;
      border-radius: .15rem;
      background: #111;
      box-shadow: 0 .3rem .7rem rgba(0,0,0,.35);
    }
    .thumb img, .thumb canvas { display: block; width: 100%; height: 100%; object-fit: cover; }
    .thumb-label { display: block; margin-top: .3rem; font-size: .66rem; font-weight: 760; white-space: nowrap; }

    :fullscreen .book, :-webkit-full-screen .book { max-height: calc(100dvh - 7.6rem); }
    :fullscreen .book.mode-spread, :-webkit-full-screen .book.mode-spread { width: min(calc((100dvh - 7.6rem) * 1.414), calc(100vw - 8.5rem)); }

    @media (max-width: 760px) {
      .topbar { height: 4.15rem; padding-inline: .75rem; }
      .brand span { display: none; }
      .brand strong { font-size: .78rem; }
      .brand-mark { height: 1.9rem; }
      .toolbar { gap: .3rem; }
      .control { min-height: 2.35rem; padding: .55rem .68rem; font-size: .64rem; }
      .control .optional { display: none; }

      .reader, body.pages-open .reader { padding: 4.6rem 2.9rem 2.9rem; }
      .book, .book.mode-spread {
        width: min(calc((100dvh - 8rem) * .707), calc(100vw - 6rem));
        max-height: calc(100dvh - 8rem);
        aspect-ratio: var(--page-ratio);
      }
      body.pages-open .book, body.pages-open .book.mode-spread {
        width: min(calc((100dvh - 8rem) * .707), calc(100vw - 6rem));
        max-height: calc(100dvh - 8rem);
      }
      .spread-layer.mode-spread .page-slot:first-child { width: 100%; }
      .spread-layer.mode-spread .page-slot:last-child { display: none; }
      .mode-spread .page-slot:first-child { border-radius: .18rem .58rem .58rem .18rem; }
      .mode-spread .page-slot:first-child::after { display: none; }
      .mode-spread .page-slot:first-child::before {
        content: "";
        position: absolute;
        left: -.35rem;
        inset-block: 0;
        z-index: 8;
        width: .42rem;
        background: var(--yellow);
      }
      .round { width: 2.65rem; height: 2.65rem; margin-top: -1.325rem; }
      .round.prev { left: .25rem; }
      .round.next { right: .25rem; }
      .status, body.pages-open .status { bottom: .72rem; }

      .pages-panel {
        top: 4.15rem;
        bottom: 0;
        left: auto;
        right: 0;
        width: min(18.5rem,78vw);
        height: auto;
        padding: .9rem;
        transform: translateX(103%);
        border-top: 0;
        border-left: 1px solid var(--line);
      }
      body.pages-open .pages-panel { transform: translateX(0); }
      .thumbs {
        flex-direction: column;
        align-items: stretch;
        overflow-x: hidden;
        overflow-y: auto;
        padding-right: .25rem;
      }
      .thumb {
        display: grid;
        grid-template-columns: 4.6rem 1fr;
        align-items: center;
        gap: .8rem;
        width: 100%;
        flex-basis: auto;
        padding: .34rem;
        text-align: left;
      }
      .thumb:hover { transform: none; border-color: transparent; }
      .thumb.is-visible { border-color: rgba(231,182,0,.35); }
      .thumb.is-selected { border-color: var(--yellow); }
      .thumb-label { margin: 0; font-size: .74rem; }
    }

    /* Interfaz lateral y visor sin desvanecimientos */
    :root { --sidebar-width: 10.5rem; }

    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 75;
      display: flex;
      flex-direction: column;
      width: var(--sidebar-width);
      padding: 1.1rem .8rem;
      border-right: 1px solid var(--line);
      background: rgba(2,13,10,.93);
      backdrop-filter: blur(18px);
      transition: transform .28s ease;
    }

    .sidebar .brand {
      width: 100%;
      margin-bottom: 2.2rem;
      padding: .15rem .25rem 1.2rem;
      border-bottom: 1px solid var(--line);
    }

    .sidebar .toolbar {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: .5rem;
      width: 100%;
    }

    .sidebar .control {
      display: flex;
      align-items: center;
      gap: .7rem;
      width: 100%;
      border-radius: .45rem;
      text-align: left;
    }

    .sidebar .icon { width: 1.2rem; font-size: 1rem; text-align: center; }

    .reader,
    body.pages-open .reader {
      left: var(--sidebar-width);
      padding: 1.25rem 4rem;
    }

    .book,
    body.pages-open .book {
      width: min(calc((100dvh - 2.5rem) * .707), calc(100vw - var(--sidebar-width) - 8rem));
      max-height: calc(100dvh - 2.5rem);
    }

    .book.mode-spread,
    body.pages-open .book.mode-spread {
      width: min(calc((100dvh - 2.5rem) * 1.414), calc(100vw - var(--sidebar-width) - 8rem));
    }

    .round.prev { left: calc(var(--sidebar-width) + 1rem); }
    .round.next { right: 1rem; }

    .status,
    body.pages-open .status {
      left: calc(var(--sidebar-width) + (100vw - var(--sidebar-width)) / 2);
      bottom: .55rem;
    }

    .pages-panel {
      inset: 0 auto 0 var(--sidebar-width);
      z-index: 64;
      display: block;
      width: 12.5rem;
      height: 100dvh;
      padding: 3.25rem .7rem .75rem;
      transform: translateX(-115%);
      border-top: 0;
      border-right: 1px solid var(--line);
      background: var(--glass);
    }
    body.pages-open .pages-panel { transform: translateX(0); }
    .pages-close { position: absolute; top: .65rem; right: .65rem; }

    .thumbs {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: .55rem;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      padding: .15rem .2rem .8rem;
    }

    .thumb {
      display: grid;
      grid-template-columns: 4.35rem 1fr;
      align-items: center;
      gap: .65rem;
      width: 100%;
      flex: 0 0 auto;
      padding: .35rem;
      text-align: left;
      transform: none;
    }
    .thumb:hover { border-color: rgba(231,182,0,.58); transform: none; }
    .thumb.is-visible:not(.is-selected) { border-color: transparent; background: transparent; }
    .thumb.is-selected { border-color: var(--yellow); background: rgba(231,182,0,.14); }
    .thumb-label { margin: 0; white-space: normal; }

    .index-panel {
      left: var(--sidebar-width);
      z-index: 65;
      transform: translateX(-110%);
    }
    body.index-open .index-panel { transform: translateX(0); }
    .backdrop { z-index: 63; }

    .spread-layer.exit-forward,
    .spread-layer.exit-back,
    .spread-layer.enter-forward,
    .spread-layer.enter-back { animation: none; opacity: 1; filter: none; transform: none; }

    .flip-leaf { background: #090a09; }
    .flip-leaf.forward { animation: leaf-forward-solid .72s cubic-bezier(.62,.05,.22,1) forwards; }
    .flip-leaf.back { animation: leaf-back-solid .72s cubic-bezier(.62,.05,.22,1) forwards; }
    @keyframes leaf-forward-solid { from { transform: rotateY(0deg); } to { transform: rotateY(-180deg); } }
    @keyframes leaf-back-solid { from { transform: rotateY(0deg); } to { transform: rotateY(180deg); } }

    .fullscreen-edge { display: none; }

    :fullscreen .fullscreen-edge {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 90;
      display: block;
      width: 1.5rem;
    }
    :fullscreen .sidebar { z-index: 89; transform: translateX(-102%); box-shadow: 1rem 0 2rem rgba(0,0,0,.48); }
    :fullscreen body.sidebar-peek .sidebar { transform: translateX(0); }
    :fullscreen .reader { left: 0; padding: 0; }
    :fullscreen .book,
    :fullscreen body.pages-open .book {
      width: calc(100dvh * .707);
      height: 100dvh;
      max-width: 100vw;
      max-height: none;
      aspect-ratio: var(--page-ratio);
      transition: none;
    }
    :fullscreen .book.mode-spread,
    :fullscreen body.pages-open .book.mode-spread {
      width: calc(100dvh * 1.414);
      height: 100dvh;
      aspect-ratio: 1191 / 842.25;
    }
    :fullscreen .page-slot { border-radius: 0 !important; }
    :fullscreen .round.prev { left: 1rem; }
    :fullscreen .status { left: 50%; bottom: .35rem; }
    :fullscreen .pages-panel,
    :fullscreen .index-panel { left: var(--sidebar-width); visibility: hidden; }
    :fullscreen body.pages-open .pages-panel,
    :fullscreen body.index-open .index-panel { visibility: visible; }

    @media (max-width: 760px) {
      :root { --sidebar-width: 3.7rem; }
      .sidebar { width: var(--sidebar-width); padding: .75rem .5rem; }
      .sidebar .brand { justify-content: center; margin-bottom: 1.3rem; padding-inline: 0; }
      .sidebar .brand div { display: none; }
      .sidebar .brand-mark { width: .35rem; height: 2rem; }
      .sidebar .control { justify-content: center; width: 2.7rem; height: 2.7rem; min-height: 0; padding: 0; }
      .sidebar .control .label { display: none; }
      .sidebar .control .icon { width: auto; }

      .reader,

      .book.mode-spread,
      body.pages-open .book,
      body.pages-open .book.mode-spread {

      .status,
      body.pages-open .status { left: calc(var(--sidebar-width) + (100vw - var(--sidebar-width)) / 2); }
      .pages-panel { left: var(--sidebar-width); width: min(17rem,calc(100vw - var(--sidebar-width))); }
      .index-panel { left: var(--sidebar-width); width: min(22rem,calc(100vw - var(--sidebar-width))); }
      :fullscreen .reader { left: 0; padding: 0; }

        max-height: 100dvh;

    /* Interacción instantánea y barra mínima de numeración. */
    :root { --status-height: 1.65rem; }

    *, *::before, *::after {
      animation: none !important;
      transition: none !important;

    }

    .flip-leaf { display: none !important; }

    .round,
    .panel-close {

    }
    .round svg,
    .panel-close svg {

      overflow: visible;

      stroke: currentColor;

      stroke-linecap: round;

    }

    .status,
    body.pages-open .status {
      inset: auto 0 0 0;
      z-index: 95;

      background: #000;

    }

    body.pages-open .reader { padding-bottom: calc(1.25rem + var(--status-height)); }

    @media (min-width: 761px) {
      .book,
      body.pages-open .book {
        width: min(calc((100dvh - 2.5rem - var(--status-height)) * .707), calc(100vw - var(--sidebar-width) - 8rem));
        max-height: calc(100dvh - 2.5rem - var(--status-height));
      }
      .book.mode-spread,
      body.pages-open .book.mode-spread {
        width: min(calc((100dvh - 2.5rem - var(--status-height)) * 1.414), calc(100vw - var(--sidebar-width) - 8rem));
      }
    }

    @media (max-width: 760px) {
      .reader,
      body.pages-open .reader { padding-bottom: calc(.7rem + var(--status-height)); }
      .book,
      .book.mode-spread,
      body.pages-open .book,
      body.pages-open .book.mode-spread {
        width: min(calc((100dvh - 1.4rem - var(--status-height)) * .707), calc(100vw - var(--sidebar-width) - 5.7rem));
        max-height: calc(100dvh - 1.4rem - var(--status-height));
      }
    }

    :fullscreen .reader,
    :fullscreen body.pages-open .reader { inset: 0 0 var(--status-height) 0; padding: 0; }
    :fullscreen .book,
    :fullscreen body.pages-open .book {
      width: calc((100dvh - var(--status-height)) * .707);
      height: calc(100dvh - var(--status-height));
      max-height: none;
    }
    :fullscreen .book.mode-spread,
    :fullscreen body.pages-open .book.mode-spread {
      width: calc((100dvh - var(--status-height)) * 1.414);
      height: calc(100dvh - var(--status-height));
    }
    :fullscreen .status,
    :fullscreen body.pages-open .status { inset: auto 0 0 0; }

    /* La página cambia en seco; la interfaz lateral sí conserva movimiento. */
    .round { display: none !important; }
    .page-slot { cursor: pointer; }
    .pdf-link { cursor: pointer; }

    .sidebar {
      transition: transform .28s cubic-bezier(.2,.8,.2,1) !important;
    }
    .pages-panel,
    .index-panel {
      transition: transform .36s cubic-bezier(.22,.78,.18,1), visibility 0s linear .36s !important;
    }
    body.pages-open .pages-panel,
    body.index-open .index-panel {
      transition-delay: 0s !important;
    }
    .backdrop {
      transition: opacity .24s ease, visibility 0s linear .24s !important;
    }
    body.index-open .backdrop { transition-delay: 0s !important; }
    .sidebar .control,
    .thumb,
    .toc button {
      transition: border-color .16s ease, background-color .16s ease, color .16s ease !important;
    }
    .sidebar .control[aria-expanded="true"],
    .sidebar .control[aria-pressed="true"] {

    @media (min-width: 761px) {

      .index-panel { transform: translateX(calc(-100% - var(--sidebar-width))); }

      body.index-open .index-panel { transform: translateX(0); }

    @media (max-width: 760px) and (orientation: portrait) {
      :root { --sidebar-height: 3.75rem; }

      .sidebar {
        inset: 0 0 auto 0;
        flex-direction: row;
        align-items: center;

      .sidebar .toolbar {

      .reader,

      }
      .book,
      .book.mode-spread,
      body.pages-open .book,
      body.pages-open .book.mode-spread {
        width: min(calc((100dvh - var(--sidebar-height) - var(--status-height) - 1.4rem) * .707), calc(100vw - 4.4rem));
        max-height: calc(100dvh - var(--sidebar-height) - var(--status-height) - 1.4rem);
      }

      .pages-panel,
      .index-panel {
        inset: var(--sidebar-height) 0 var(--status-height) 0;
        width: 100%;
        height: auto;
        transform: translateY(-105%);
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      body.pages-open .pages-panel,
      body.index-open .index-panel { transform: translateY(0); }

      :fullscreen .fullscreen-edge {
        inset: 0 0 auto 0;
        width: 100%;
        height: 1.5rem;
      }
      :fullscreen .sidebar { transform: translateY(-105%); }
      :fullscreen body.sidebar-peek .sidebar { transform: translateY(0); }
      :fullscreen .reader,
      :fullscreen body.pages-open .reader { inset: 0 0 var(--status-height) 0; padding: 0; }
      :fullscreen .pages-panel,
      :fullscreen .index-panel {
        inset: var(--sidebar-height) 0 var(--status-height) 0;
        width: 100%;
      }
    }

    /* Ajustes finales para interacción táctil y móvil vertical. */
    .sidebar .icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 1.25rem;
      height: 1.25rem;
      flex: 0 0 1.25rem;
      line-height: 0;
    }
    .sidebar .icon svg {
      display: block;
      width: 1.1rem;
      height: 1.1rem;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.65;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .sidebar .icon circle { fill: currentColor; stroke: none; }

    .thumbs,
    .index-panel {
      scrollbar-gutter: stable;
      scrollbar-width: thin;
      scrollbar-color: rgba(231,182,0,.55) rgba(255,255,255,.045);
    }
    .thumbs { padding-right: .8rem; }
    .index-panel { padding: .85rem 1rem 1rem 1.25rem; }
    .index-panel .toc { padding-top: 0; border-top: 0; }
    .thumbs::-webkit-scrollbar,
    .index-panel::-webkit-scrollbar { width: .38rem; }
    .thumbs::-webkit-scrollbar-track,
    .index-panel::-webkit-scrollbar-track { background: rgba(255,255,255,.045); }
    .thumbs::-webkit-scrollbar-thumb,
    .index-panel::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(231,182,0,.55);
    }

    @media (max-width: 760px) and (orientation: portrait) {
      :root { --sidebar-height: 4.25rem; }

      .sidebar { padding: .52rem .58rem; }
      .sidebar .brand {
        display: flex;
        align-items: center;
        gap: .48rem;
        min-width: 8.7rem;

      .sidebar .brand-mark {
        width: .25rem;
        height: 2.2rem;
        flex: 0 0 .25rem;
      }
      .sidebar .brand strong { font-size: .68rem; line-height: 1.2; }
      .sidebar .brand span {
        display: block;
        max-width: 7rem;

      }

      .sidebar .control {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 2.55rem;
        height: 2.55rem;
        padding: 0;
      }
      .sidebar .control .icon {
        width: 1.25rem;
        height: 1.25rem;
        flex-basis: 1.25rem;
      }

      .pages-panel { padding: .7rem .45rem .7rem .7rem; }
      .thumbs { padding: .15rem .8rem .9rem .1rem; }
      .index-panel { padding-right: .85rem; }
      .toc { padding-right: .55rem; }

      .thumb.is-visible:not(.is-selected),
      .thumb:hover:not(.is-selected) {
        border-color: transparent !important;
        color: var(--muted);
        background: transparent !important;
        transform: none !important;
      }
      .thumb.is-selected,
      .thumb.is-selected:hover {
        border-color: var(--yellow) !important;
        color: var(--ink);
        background: rgba(231,182,0,.13) !important;
      }

      body.mobile-fullscreen .reader,
      body.mobile-fullscreen.pages-open .reader {
        inset: var(--sidebar-height) 0 var(--status-height) 0;
        padding: 0;
      }
      body.mobile-fullscreen .book,
      body.mobile-fullscreen .book.mode-spread,
      body.mobile-fullscreen.pages-open .book,
      body.mobile-fullscreen.pages-open .book.mode-spread,
      :fullscreen .book,
      :fullscreen .book.mode-spread {
        width: 100vw;
        height: auto;
        max-width: none;
        max-height: calc(100dvh - var(--sidebar-height) - var(--status-height));
        aspect-ratio: var(--page-ratio);
        filter: none;
      }

      :fullscreen .page-slot { border-radius: 0 !important; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>

<body>
  <main class="app">
    <div class="fullscreen-edge" aria-hidden="true"></div>
    <header class="sidebar" id="sidebar">
      <div class="brand" aria-label="Carpeta de producción Turno">
        <i class="brand-mark" aria-hidden="true"></i>
        <div><strong>Turno</strong><span>Carpeta de producción</span></div>
      </div>
      <nav class="toolbar" aria-label="Herramientas del libro">
        <button class="control" id="indexOpen" type="button" aria-controls="indexPanel" aria-expanded="false"><span class="icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 7h11M8 12h11M8 17h11"/><circle cx="4.5" cy="7" r=".8"/><circle cx="4.5" cy="12" r=".8"/><circle cx="4.5" cy="17" r=".8"/></svg></span><span class="label">Índice</span></button>
        <button class="control" id="pagesToggle" type="button" aria-controls="pagesPanel" aria-expanded="false"><span class="icon"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="6" height="7" rx=".7"/><rect x="14" y="4" width="6" height="7" rx=".7"/><rect x="4" y="14" width="6" height="6" rx=".7"/><rect x="14" y="14" width="6" height="6" rx=".7"/></svg></span><span class="label">Páginas</span></button>
        <button class="control" id="fullscreen" type="button" aria-label="Activar pantalla completa" aria-pressed="false"><span class="icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 4H4v5M15 4h5v5M20 15v5h-5M9 20H4v-5"/></svg></span><span class="label">Pantalla</span></button>
      </nav>
    </header>

    <section class="reader" id="reader" aria-label="Visor del libro">
      <button class="round prev" id="prev" type="button" aria-label="Páginas anteriores" hidden></button>

      <div class="book mode-spread" id="book">
        <div class="spread-layer active mode-spread" id="layerA">
          <article class="page-slot">
            <canvas class="page-canvas"></canvas><img class="page-image" alt="" hidden><div class="link-layer"></div>
          </article>
          <article class="page-slot">
            <canvas class="page-canvas"></canvas><img class="page-image" alt="" hidden><div class="link-layer"></div>
          </article>
        </div>
        <div class="spread-layer hidden mode-spread" id="layerB">
          <article class="page-slot">
            <canvas class="page-canvas"></canvas><img class="page-image" alt="" hidden><div class="link-layer"></div>
          </article>
          <article class="page-slot">
            <canvas class="page-canvas"></canvas><img class="page-image" alt="" hidden><div class="link-layer"></div>
          </article>
        </div>
        <div class="flip-leaf" id="flipLeaf"><canvas></canvas></div>
        <div class="loading" id="loading">Preparando el libro…</div>
      </div>

      <button class="round next" id="next" type="button" aria-label="Páginas siguientes" hidden></button>
    </section>

    <div class="status" id="status"><strong>Portada</strong></div>
  </main>

  <div class="backdrop" id="backdrop"></div>
  <aside class="index-panel" id="indexPanel" aria-hidden="true">
    <nav class="toc" id="toc"></nav>
  </aside>

  <aside class="pages-panel" id="pagesPanel" aria-hidden="true">
    <div class="thumbs" id="thumbs"></div>
  </aside>

  <script type="module">
    const PDF_URL = "./libro.pdf";
    const FILE_MODE = location.protocol === "file:";
    const PDF_WIDTH = 595.5;
    const PDF_HEIGHT = 842.25;
    const MOBILE_QUERY = matchMedia("(max-width: 760px)");

    const TOC = [
      { page: 1, title: "Portada" },
      { page: 2, title: "Presentación" },
      { page: 3, title: "Índice — primera parte" },
      { page: 4, title: "Índice — segunda parte" },
      { page: 5, title: "Índice — cierre" },
      { page: 6, title: "Referencias bibliográficas" }
    ];

    const MANUAL_LINKS = {
      6: [
        {
          rect: [119.61, 424.40, 462.66, 444.00],
          url: "https://www.gob.pe/institucion/mtc/noticias/1228166-mtc-exhorta-a-proteger-la-vida-en-el-dia-mundial-del-peaton",
          label: "Abrir noticia del Día Mundial del Peatón"
        },
        {
          rect: [119.61, 321.42, 475.17, 352.22],
          url: "https://www.gob.pe/institucion/vivienda/noticias/1199693-ministerio-de-vivienda-publica-la-guia-dot-que-promueve-el-desarrollo-del-transporte-en-la-planificacion-urbana-en-lima-y-callao",
          label: "Abrir noticia de la Guía DOT"
        }
      ]
    };

    const FILE_LINKS = {
      6: [
        { rect: [119.610725,515.31403,474.47827,525.81305], url: "https://www.gob.pe/institucion/mtc/noticias/933018-mtc-entrega-al-concesionario-area-donde-se-construira-la-estacion-central-de-la-linea-2-del-metro" },
        { rect: [119.610725,504.11505,413.58386,514.61407], url: "https://www.gob.pe/institucion/mtc/noticias/933018-mtc-entrega-al-concesionario-area-donde-se-construira-la-estacion-central-de-la-linea-2-del-metro" },
        { rect: [119.610725,159.58287,253.99844,170.08191], url: "https://doi.org/10.18235/0010655" }
      ]
    };

    const $ = (selector) => document.querySelector(selector);
    const book = $("#book");
    const loading = $("#loading");
    const status = $("#status");
    const prev = $("#prev");
    const next = $("#next");
    const thumbs = $("#thumbs");
    const pagesToggle = $("#pagesToggle");
    const pagesPanel = $("#pagesPanel");
    const indexPanel = $("#indexPanel");
    const toc = $("#toc");
    const flipLeaf = $("#flipLeaf");

    let pdf = null;
    let pdfjsLib = null;
    let totalPages = 0;
    let focusPage = 1;
    let visiblePages = [1];
    let activeLayer = $("#layerA");
    let spareLayer = $("#layerB");
    let busy = false;
    let touchStartX = 0;
    let resizeTimer = null;
    let thumbObserver = null;

    const contentNumber = (pdfPage) => pdfPage - 1;
    const contentTotal = () => Math.max(0, totalPages - 1);
    const spreadStart = (page) => page <= 1 ? 1 : page % 2 === 0 ? page : page - 1;

    function displayFor(page) {
      if (MOBILE_QUERY.matches) return { mode: "single", pages: [page] };
      if (page === 1) return { mode: "spread", pages: [null,1] };
      const start = spreadStart(page);
      return { mode: "spread", pages: [start, start + 1 <= totalPages ? start + 1 : null] };
    }

    function makeViewport(scale) {
      return {
        convertToViewportRectangle(rect) {
          return [rect[0] * scale, (PDF_HEIGHT - rect[1]) * scale, rect[2] * scale, (PDF_HEIGHT - rect[3]) * scale];
        }
      };
    }

    function addLink(layer, rect, viewport, url, label = "Abrir enlace externo") {
      const points = viewport.convertToViewportRectangle(rect);
      const link = document.createElement("a");
      link.className = "pdf-link";
      link.href = url;
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      link.setAttribute("aria-label", label);
      link.style.left = `${Math.min(points[0],points[2])}px`;
      link.style.top = `${Math.min(points[1],points[3])}px`;
      link.style.width = `${Math.abs(points[0]-points[2])}px`;
      link.style.height = `${Math.max(10,Math.abs(points[1]-points[3]))}px`;
      link.addEventListener("click", event => event.stopPropagation());
      layer.append(link);
    }

    async function renderPdfPage(slot, pageNumber) {
      const page = await pdf.getPage(pageNumber);
      const canvas = slot.querySelector("canvas");
      const image = slot.querySelector("img");
      const links = slot.querySelector(".link-layer");
      const base = page.getViewport({ scale: 1 });
      const cssScale = slot.clientWidth / base.width;
      const dpr = Math.min((devicePixelRatio || 1) * 2, 3);
      const renderViewport = page.getViewport({ scale: cssScale * dpr });
      const linkViewport = page.getViewport({ scale: cssScale });

      canvas.hidden = false;
      image.hidden = true;
      canvas.width = Math.ceil(renderViewport.width);
      canvas.height = Math.ceil(renderViewport.height);
      canvas.style.width = `${linkViewport.width}px`;
      canvas.style.height = `${linkViewport.height}px`;
      links.replaceChildren();

      await page.render({ canvasContext: canvas.getContext("2d",{alpha:false}), viewport: renderViewport }).promise;
      const annotations = await page.getAnnotations({ intent: "display" });
      for (const annotation of annotations) {
        const url = annotation.url || annotation.unsafeUrl;
        if (url && annotation.rect) addLink(links,annotation.rect,linkViewport,url);
      }
      for (const item of MANUAL_LINKS[pageNumber] || []) addLink(links,item.rect,linkViewport,item.url,item.label);
    }

    async function renderImagePage(slot, pageNumber) {
      const canvas = slot.querySelector("canvas");
      const image = slot.querySelector("img");
      const links = slot.querySelector(".link-layer");
      const scale = slot.clientWidth / PDF_WIDTH;
      const source = `./pages/page-${pageNumber}.jpg`;

      canvas.hidden = true;
      image.hidden = false;
      links.replaceChildren();
      image.alt = pageNumber === 1 ? "Portada" : `Página ${contentNumber(pageNumber)}`;
      if (image.getAttribute("src") !== source) {
        image.src = source;
        await new Promise((resolve,reject) => {
          if (image.complete && image.naturalWidth) resolve();
          else {
            image.addEventListener("load",resolve,{once:true});
            image.addEventListener("error",reject,{once:true});
          }
        });
      }
      const viewport = makeViewport(scale);
      for (const item of FILE_LINKS[pageNumber] || []) addLink(links,item.rect,viewport,item.url);
      for (const item of MANUAL_LINKS[pageNumber] || []) addLink(links,item.rect,viewport,item.url,item.label);
    }

    async function renderSlot(slot, pageNumber) {
      slot.classList.toggle("blank",!pageNumber);
      slot.dataset.page = pageNumber || "";
      slot.querySelector(".link-layer").replaceChildren();
      if (!pageNumber) {
        slot.querySelector("canvas").hidden = true;
        slot.querySelector("img").hidden = true;
        slot.setAttribute("aria-label","Página en blanco");
        return;
      }
      slot.classList.remove("blank");
      slot.setAttribute("aria-label",pageNumber === 1 ? "Portada" : `Página ${contentNumber(pageNumber)} de ${contentTotal()}`);
      if (FILE_MODE) await renderImagePage(slot,pageNumber);
      else await renderPdfPage(slot,pageNumber);
    }

    async function renderLayer(layer,page) {
      const display = displayFor(page);
      layer.classList.remove("mode-single","mode-spread");
      layer.classList.add(`mode-${display.mode}`);
      const slots = [...layer.querySelectorAll(".page-slot")];
      await Promise.all([renderSlot(slots[0],display.pages[0]),renderSlot(slots[1],display.pages[1])]);
      return display;
    }

    function copyPageToLeaf(direction) {
      const slots = [...activeLayer.querySelectorAll(".page-slot")];
      const sourceSlot = MOBILE_QUERY.matches
        ? slots[0]
        : visiblePages.length === 1
          ? slots.find(slot => Number(slot.dataset.page) === focusPage) || slots[0]
          : direction === "forward" ? slots[1] : slots[0];
      const sourceCanvas = sourceSlot.querySelector("canvas");
      const sourceImage = sourceSlot.querySelector("img");
      const canvas = flipLeaf.querySelector("canvas");
      const spread = !MOBILE_QUERY.matches && activeLayer.classList.contains("mode-spread");
      const source = sourceCanvas.hidden ? sourceImage : sourceCanvas;

      if (!source || (!sourceCanvas.hidden && !sourceCanvas.width) || (sourceCanvas.hidden && !sourceImage.naturalWidth)) return false;
      canvas.width = sourceCanvas.hidden ? sourceImage.naturalWidth : sourceCanvas.width;
      canvas.height = sourceCanvas.hidden ? sourceImage.naturalHeight : sourceCanvas.height;
      canvas.getContext("2d").drawImage(source,0,0,canvas.width,canvas.height);
      flipLeaf.style.width = spread ? "50%" : "100%";
      flipLeaf.style.left = spread && direction === "forward" ? "50%" : "0";
      flipLeaf.className = `flip-leaf ${direction === "forward" ? "forward" : "back"}`;
      return true;
    }

    function updateBookMode(mode) {
      book.classList.toggle("mode-spread",mode === "spread" && !MOBILE_QUERY.matches);
      book.classList.toggle("mode-single",mode !== "spread" || MOBILE_QUERY.matches);
    }

    function updateStatus() {
      if (focusPage === 1) status.innerHTML = "<strong>Portada</strong>";
      else if (!MOBILE_QUERY.matches && visiblePages.length > 1) {
        const first = contentNumber(visiblePages[0]);
        const last = visiblePages[1] ? contentNumber(visiblePages[1]) : first;
        status.innerHTML = first === last ? `Página <strong>${first}</strong> de ${contentTotal()}` : `Páginas <strong>${first}–${last}</strong> de ${contentTotal()}`;
      } else status.innerHTML = `Página <strong>${contentNumber(focusPage)}</strong> de ${contentTotal()}`;
    }

    function updateUi() {
      const start = spreadStart(focusPage);
      prev.disabled = focusPage === 1;
      next.disabled = MOBILE_QUERY.matches ? focusPage >= totalPages : focusPage !== 1 && start + 2 > totalPages;
      updateStatus();
      document.querySelectorAll(".thumb").forEach(button => {
        const page = Number(button.dataset.page);
        button.classList.toggle("is-selected",page === focusPage);
        button.toggleAttribute("aria-current",page === focusPage);
      });
      toc.querySelectorAll("button").forEach(button => button.toggleAttribute("aria-current",Number(button.dataset.page) === focusPage));
    }

    async function goToPage(target,direction = target > focusPage ? "forward" : "back",animate = false) {
      if (busy || target < 1 || target > totalPages || target === focusPage) return;
      busy = true;
      prev.disabled = next.disabled = true;

      try {
        const oldMode = displayFor(focusPage).mode;
        const newDisplay = displayFor(target);
        updateBookMode(newDisplay.mode);
        spareLayer.className = `spread-layer incoming mode-${newDisplay.mode}`;
        await renderLayer(spareLayer,target);

        activeLayer.className = `spread-layer hidden mode-${oldMode}`;
        spareLayer.className = `spread-layer active mode-${newDisplay.mode}`;
        [activeLayer,spareLayer] = [spareLayer,activeLayer];
        focusPage = target;
        visiblePages = newDisplay.pages.filter(Boolean);
      } finally {
        busy = false;
        updateUi();
      }
    }

    function nextDisplay() {
      if (MOBILE_QUERY.matches) return goToPage(focusPage + 1,"forward");
      if (focusPage === 1) return goToPage(2,"forward");
      return goToPage(spreadStart(focusPage) + 2,"forward");
    }

    function previousDisplay() {
      if (MOBILE_QUERY.matches) return goToPage(focusPage - 1,"back");
      const start = spreadStart(focusPage);
      return goToPage(start <= 2 ? 1 : start - 2,"back");
    }

    function buildToc() {
      toc.replaceChildren(...TOC.filter(item => item.page <= totalPages).map(item => {
        const button = document.createElement("button");
        button.type = "button";
        button.dataset.page = item.page;
        button.innerHTML = `<span class="toc-number">${item.page === 1 ? "—" : String(contentNumber(item.page)).padStart(2,"0")}</span><span>${item.title}</span>`;
        button.addEventListener("click",() => { goToPage(item.page, item.page > focusPage ? "forward" : "back",false); closeIndex(); });
        return button;
      }));
    }

    async function renderThumb(button,pageNumber) {
      if (button.dataset.ready) return;
      const media = button.querySelector(".thumb-media");
      if (FILE_MODE) {
        const image = document.createElement("img");
        image.src = `./pages/page-${pageNumber}.jpg`;
        image.alt = "";
        media.append(image);
      } else {
        const page = await pdf.getPage(pageNumber);
        const canvas = document.createElement("canvas");
        const base = page.getViewport({scale:1});
        const scale = 95 / base.width;
        const viewport = page.getViewport({scale:scale * Math.min(devicePixelRatio || 1,2)});
        canvas.width = Math.ceil(viewport.width);
        canvas.height = Math.ceil(viewport.height);
        media.append(canvas);
        await page.render({canvasContext:canvas.getContext("2d",{alpha:false}),viewport}).promise;
      }
      button.dataset.ready = "true";
    }

    function buildThumbs() {
      const fragment = document.createDocumentFragment();
      for (let page = 1; page <= totalPages; page++) {
        const button = document.createElement("button");
        button.className = "thumb";
        button.type = "button";
        button.dataset.page = page;
        button.innerHTML = `<span class="thumb-media"></span><span class="thumb-label">${page === 1 ? "Portada" : `Página ${contentNumber(page)}`}</span>`;
        button.addEventListener("click",() => {
          goToPage(page,page > focusPage ? "forward" : "back");
          closePages();
        });
        fragment.append(button);
      }
      thumbs.replaceChildren(fragment);
      thumbObserver = new IntersectionObserver(entries => entries.forEach(entry => entry.isIntersecting && renderThumb(entry.target,Number(entry.target.dataset.page))),{root:thumbs,rootMargin:"120px"});
      thumbs.querySelectorAll(".thumb").forEach(button => thumbObserver.observe(button));
    }

    function scrollSelectedThumb() {
      requestAnimationFrame(() => thumbs.querySelector(".thumb.is-selected")?.scrollIntoView({behavior:"auto",block:"nearest",inline:"center"}));
    }

    const PANEL_CLOSE_MS = 380;
    let panelCloseTimer = 0;
    let lastPointerX = -1;
    let lastPointerY = -1;

    function pointerOverSidebar() {
      const topPanel = MOBILE_QUERY.matches && innerHeight > innerWidth;
      return sidebar.matches(":hover") || (topPanel
        ? lastPointerY >= 0 && lastPointerY <= sidebar.offsetHeight
        : lastPointerX >= 0 && lastPointerX <= sidebar.offsetWidth);
    }

    function cancelPanelClose() {
      clearTimeout(panelCloseTimer);
      panelCloseTimer = 0;
      document.body.classList.remove("panel-closing");
    }

    function finishPanelClose(keepSidebar) {
      if (!document.fullscreenElement) return;
      cancelPanelClose();
      document.body.classList.add("panel-closing","sidebar-peek");
      panelCloseTimer = setTimeout(() => {
        panelCloseTimer = 0;
        document.body.classList.remove("panel-closing");
        document.body.classList.toggle("sidebar-peek",Boolean(keepSidebar && pointerOverSidebar()));
      },PANEL_CLOSE_MS);
    }

    function openPages() {
      cancelPanelClose();
      closeIndex();
      cancelPanelClose();
      document.body.classList.add("pages-open");
      pagesPanel.setAttribute("aria-hidden","false");
      pagesToggle.setAttribute("aria-expanded","true");
      if (document.fullscreenElement) document.body.classList.add("sidebar-peek");
      scrollSelectedThumb();
    }
    function closePages(keepSidebar = false) {
      if (!document.body.classList.contains("pages-open")) return;
      document.body.classList.remove("pages-open");
      pagesPanel.setAttribute("aria-hidden","true");
      pagesToggle.setAttribute("aria-expanded","false");
      finishPanelClose(keepSidebar);
    }
    function openIndex() {
      cancelPanelClose();
      closePages();
      cancelPanelClose();
      document.body.classList.add("index-open");
      indexPanel.setAttribute("aria-hidden","false");
      $("#indexOpen").setAttribute("aria-expanded","true");
      if (document.fullscreenElement) document.body.classList.add("sidebar-peek");
    }
    function closeIndex(keepSidebar = false) {
      if (!document.body.classList.contains("index-open")) return;
      document.body.classList.remove("index-open");
      indexPanel.setAttribute("aria-hidden","true");
      $("#indexOpen").setAttribute("aria-expanded","false");
      finishPanelClose(keepSidebar);
    }

    async function rerenderCurrent() {
      if (!pdf || busy) return;
      await renderLayer(activeLayer,focusPage);
      visiblePages = displayFor(focusPage).pages.filter(Boolean);
      updateUi();
    }

    function showError(error) {
      console.error(error);
      loading.hidden = false;
      loading.innerHTML = `<div class="error-card"><strong>No se pudo cargar el libro.</strong><br><br>Comprueba que <em>libro.pdf</em>, <em>pages</em> y <em>vendor</em> estén junto a index.html.<br><br><a href="${PDF_URL}" target="_blank">Abrir el PDF</a></div>`;
    }

    prev.addEventListener("click",previousDisplay);
    next.addEventListener("click",nextDisplay);
    $("#indexOpen").addEventListener("click",() => document.body.classList.contains("index-open") ? closeIndex(true) : openIndex());
    pagesToggle.addEventListener("click",() => document.body.classList.contains("pages-open") ? closePages(true) : openPages());

    document.addEventListener("click",event => {
      const pagesOpen = document.body.classList.contains("pages-open");
      const indexOpen = document.body.classList.contains("index-open");
      if (!pagesOpen && !indexOpen) return;
      const inExtendedPanel = event.target.closest?.(".pages-panel, .index-panel");
      const inSidebar = event.target.closest?.(".sidebar");
      if (inExtendedPanel || (inSidebar && event.target.closest?.(".control"))) return;
      event.preventDefault();
      event.stopPropagation();
      if (pagesOpen) closePages(Boolean(inSidebar));
      if (indexOpen) closeIndex(Boolean(inSidebar));
    },true);

    book.addEventListener("click",event => {
      if (busy || event.target.closest("a")) return;
      const slot = event.target.closest(".page-slot");
      if (!slot || slot.closest(".spread-layer") !== activeLayer) return;
      if (MOBILE_QUERY.matches || activeLayer.classList.contains("mode-single")) {
        const bounds = slot.getBoundingClientRect();
        event.clientX < bounds.left + bounds.width / 2 ? previousDisplay() : nextDisplay();
        return;
      }
      const slots = [...activeLayer.querySelectorAll(".page-slot")];
      slot === slots[0] ? previousDisplay() : nextDisplay();
    });

    const fullscreenButton = $("#fullscreen");
    const isPortraitMobile = () => MOBILE_QUERY.matches && innerHeight > innerWidth;

    fullscreenButton.addEventListener("click",async () => {
      if (isPortraitMobile()) {
        const enabled = document.body.classList.toggle("mobile-fullscreen");
        fullscreenButton.setAttribute("aria-pressed",String(enabled));
        fullscreenButton.setAttribute("aria-label",enabled ? "Salir de pantalla completa" : "Activar pantalla completa");
        setTimeout(rerenderCurrent,80);
        return;
      }
      const enteringFullscreen = !document.fullscreenElement;
      if (!enteringFullscreen) document.body.classList.remove("sidebar-peek");
      try {
        if (!document.fullscreenElement) await document.documentElement.requestFullscreen?.();
        else await document.exitFullscreen?.();
      } catch (error) {
        console.warn("El navegador no permitió pantalla completa.",error);
      }
      setTimeout(rerenderCurrent,450);
    });

    const fullscreenEdge = $(".fullscreen-edge");
    const sidebar = $("#sidebar");
    fullscreenEdge.addEventListener("pointerenter",() => {
      if (document.fullscreenElement) document.body.classList.add("sidebar-peek");
    });
    sidebar.addEventListener("pointerleave",() => {
      if (document.fullscreenElement && !document.body.classList.contains("pages-open") && !document.body.classList.contains("index-open") && !document.body.classList.contains("panel-closing")) {
        document.body.classList.remove("sidebar-peek");
      }
    });
    document.addEventListener("pointermove",event => {
      lastPointerX = event.clientX;
      lastPointerY = event.clientY;
      if (!document.fullscreenElement || !document.body.classList.contains("sidebar-peek")) return;
      if (document.body.classList.contains("pages-open") || document.body.classList.contains("index-open") || document.body.classList.contains("panel-closing")) return;
      const isPanel = event.target.closest?.(".sidebar, .pages-panel, .index-panel");
      const topPanel = MOBILE_QUERY.matches && innerHeight > innerWidth;
      const leftPanelArea = topPanel ? event.clientY <= sidebar.offsetHeight : event.clientX <= sidebar.offsetWidth;
      if (!isPanel && !leftPanelArea) {
        document.body.classList.remove("sidebar-peek");
      }
    });
    document.addEventListener("fullscreenchange",() => {
      const panelOpen = document.body.classList.contains("pages-open") || document.body.classList.contains("index-open");
      const keepSidebar = Boolean(document.fullscreenElement && (panelOpen || pointerOverSidebar()));
      document.body.classList.toggle("sidebar-peek",keepSidebar);
      fullscreenButton.setAttribute("aria-pressed",String(Boolean(document.fullscreenElement)));
      fullscreenButton.setAttribute("aria-label",document.fullscreenElement ? "Salir de pantalla completa" : "Activar pantalla completa");
      setTimeout(rerenderCurrent,120);
    });

    document.addEventListener("keydown",event => {
      if (event.key === "ArrowRight" || event.key === "PageDown") nextDisplay();
      if (event.key === "ArrowLeft" || event.key === "PageUp") previousDisplay();
      if (event.key === "Escape") { closeIndex(); closePages(); }
    });

    $("#reader").addEventListener("touchstart",event => touchStartX = event.changedTouches[0].clientX,{passive:true});
    $("#reader").addEventListener("touchend",event => {
      const delta = event.changedTouches[0].clientX - touchStartX;
      if (Math.abs(delta) < 52) return;
      delta < 0 ? nextDisplay() : previousDisplay();
    },{passive:true});

    window.addEventListener("resize",() => {
      if (document.body.classList.contains("mobile-fullscreen") && !isPortraitMobile()) {
        document.body.classList.remove("mobile-fullscreen");
        fullscreenButton.setAttribute("aria-pressed","false");
        fullscreenButton.setAttribute("aria-label","Activar pantalla completa");
      }
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(rerenderCurrent,260);
    });

    MOBILE_QUERY.addEventListener?.("change",async () => {
      const display = displayFor(focusPage);
      updateBookMode(display.mode);
      await rerenderCurrent();
    });

    try {
      if (FILE_MODE) pdf = {numPages:6};
      else {
        pdfjsLib = await import("./vendor/pdf.min.mjs");
        pdfjsLib.GlobalWorkerOptions.workerSrc = "./vendor/pdf.worker.min.mjs";
        pdf = await pdfjsLib.getDocument({url:PDF_URL}).promise;
      }
      totalPages = pdf.numPages;
      buildToc();
      buildThumbs();
      const initialDisplay = displayFor(focusPage);
      updateBookMode(initialDisplay.mode);
      await new Promise(resolve => requestAnimationFrame(resolve));
      const display = await renderLayer(activeLayer,focusPage);
      visiblePages = display.pages.filter(Boolean);
      loading.hidden = true;
      updateUi();
    } catch (error) { showError(error); }
  </script>
</body>
</html>
